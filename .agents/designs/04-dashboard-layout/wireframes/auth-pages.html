<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkillBridge AI — Auth Pages Wireframe</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;700&family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
/* ===== RESET & TOKENS ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --color-primary: #6366F1;
  --color-primary-rgb: 99, 102, 241;
  --color-secondary: #22D3EE;
  --color-secondary-rgb: 34, 211, 238;
  --color-accent: #10B981;
  --color-accent-rgb: 16, 185, 129;

  --color-dark: #0B0E14;
  --color-dark-2: #161B22;
  --color-dark-border: #30363D;

  --color-text-light: rgba(248, 250, 252, 0.92);
  --color-text-light-muted: rgba(248, 250, 252, 0.55);
  --color-text-light-dim: rgba(248, 250, 252, 0.35);

  --gradient-primary: linear-gradient(135deg, #6366F1 0%, #22D3EE 100%);

  --font-display: 'Nunito', sans-serif;
  --font-body: 'Inter', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;

  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 24px;
  --radius-pill: 9999px;
}

html { scroll-behavior: smooth; }

body {
  font-family: var(--font-body);
  background: var(--color-dark);
  color: var(--color-text-light);
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ===== BACKGROUND ===== */
.auth-bg {
  position: fixed;
  inset: 0;
  z-index: 0;
  overflow: hidden;
}

/* Dot grid */
.auth-bg::before {
  content: "";
  position: absolute;
  inset: 0;
  background-image: radial-gradient(circle, rgba(99, 102, 241, 0.12) 1px, transparent 1px);
  background-size: 30px 30px;
  pointer-events: none;
  z-index: 1;
}

/* Floating blobs */
.auth-blob {
  position: absolute;
  border-radius: 50%;
  filter: blur(80px);
  pointer-events: none;
  animation: blob-float 9s ease-in-out infinite;
}

.auth-blob-1 {
  width: 400px;
  height: 400px;
  background: radial-gradient(circle, rgba(99, 102, 241, 0.25) 0%, transparent 70%);
  top: -10%;
  left: -5%;
  animation-delay: 0s;
}

.auth-blob-2 {
  width: 350px;
  height: 350px;
  background: radial-gradient(circle, rgba(34, 211, 238, 0.18) 0%, transparent 70%);
  bottom: -10%;
  right: -5%;
  animation-delay: -3s;
}

.auth-blob-3 {
  width: 250px;
  height: 250px;
  background: radial-gradient(circle, rgba(99, 102, 241, 0.12) 0%, transparent 70%);
  top: 50%;
  right: 20%;
  animation-delay: -6s;
}

@keyframes blob-float {
  0%, 100% { transform: translateY(0) scale(1); }
  50% { transform: translateY(-28px) scale(1.04); }
}

/* ===== WIREFRAME TAB SWITCHER ===== */
.wireframe-tabs {
  position: fixed;
  top: 16px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 100;
  display: flex;
  gap: 4px;
  background: rgba(22, 27, 34, 0.85);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid var(--color-dark-border);
  border-radius: var(--radius-pill);
  padding: 4px;
}

.wireframe-tab {
  font-family: var(--font-body);
  font-size: 13px;
  font-weight: 500;
  color: var(--color-text-light-muted);
  background: none;
  border: none;
  padding: 8px 20px;
  border-radius: var(--radius-pill);
  cursor: pointer;
  transition: all 0.25s ease;
  white-space: nowrap;
}

.wireframe-tab:hover {
  color: var(--color-text-light);
  background: rgba(255, 255, 255, 0.06);
}

.wireframe-tab.active {
  color: #fff;
  background: var(--gradient-primary);
  box-shadow: 0 0 16px rgba(99, 102, 241, 0.3);
}

/* ===== AUTH CONTAINER ===== */
.auth-container {
  position: relative;
  z-index: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 80px 20px 40px;
}

/* ===== AUTH CARD ===== */
.auth-card {
  width: 100%;
  max-width: 420px;
  background: rgba(255, 255, 255, 0.04);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border: 1px solid rgba(255, 255, 255, 0.08);
  border-radius: var(--radius-xl);
  overflow: hidden;
  position: relative;
  animation: card-appear 0.5s ease forwards;
}

@keyframes card-appear {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Gradient accent line at top */
.auth-card::before {
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: var(--gradient-primary);
  z-index: 2;
}

.auth-card-inner {
  padding: 40px 36px 36px;
}

/* ===== LOGO ===== */
.auth-logo {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  margin-bottom: 28px;
}

.auth-logo-icon {
  width: 40px;
  height: 40px;
  background: var(--gradient-primary);
  border-radius: var(--radius-md);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  box-shadow: 0 0 20px rgba(99, 102, 241, 0.25);
}

.auth-logo-icon svg {
  width: 22px;
  height: 22px;
  color: white;
}

.auth-logo-text {
  font-family: var(--font-display);
  font-weight: 800;
  font-size: 22px;
  background: var(--gradient-primary);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

/* ===== HEADINGS ===== */
.auth-heading {
  text-align: center;
  margin-bottom: 28px;
}

.auth-title {
  font-family: var(--font-display);
  font-weight: 800;
  font-size: 24px;
  color: var(--color-text-light);
  margin-bottom: 6px;
}

.auth-subtitle {
  font-size: 14px;
  color: var(--color-text-light-muted);
}

/* ===== GOOGLE BUTTON ===== */
.auth-google-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  width: 100%;
  padding: 12px 20px;
  background: rgba(255, 255, 255, 0.05);
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: var(--radius-md);
  color: var(--color-text-light);
  font-family: var(--font-body);
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.25s ease;
}

.auth-google-btn:hover {
  background: rgba(255, 255, 255, 0.08);
  border-color: rgba(255, 255, 255, 0.18);
  transform: translateY(-1px);
}

.auth-google-btn svg {
  width: 18px;
  height: 18px;
  flex-shrink: 0;
}

/* ===== DIVIDER ===== */
.auth-divider {
  display: flex;
  align-items: center;
  gap: 16px;
  margin: 24px 0;
}

.auth-divider-line {
  flex: 1;
  height: 1px;
  background: rgba(255, 255, 255, 0.08);
}

.auth-divider-text {
  font-size: 12px;
  color: var(--color-text-light-dim);
  text-transform: lowercase;
  letter-spacing: 0.5px;
}

/* ===== FORM ===== */
.auth-form {
  display: flex;
  flex-direction: column;
  gap: 18px;
}

.auth-field {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.auth-label {
  font-size: 13px;
  font-weight: 500;
  color: var(--color-text-light-muted);
}

.auth-input {
  width: 100%;
  padding: 12px 14px;
  background: var(--color-dark-2);
  border: 1px solid var(--color-dark-border);
  border-radius: var(--radius-sm);
  color: var(--color-text-light);
  font-family: var(--font-body);
  font-size: 14px;
  outline: none;
  transition: all 0.2s ease;
}

.auth-input::placeholder {
  color: var(--color-text-light-dim);
}

.auth-input:focus {
  border-color: rgba(99, 102, 241, 0.5);
  box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.12);
}

/* ===== ERROR MESSAGE ===== */
.auth-error {
  font-size: 13px;
  color: #f87171;
  text-align: center;
  padding: 8px 12px;
  background: rgba(248, 113, 113, 0.08);
  border-radius: var(--radius-sm);
  border: 1px solid rgba(248, 113, 113, 0.15);
  display: none;
}

.auth-error.visible {
  display: block;
}

/* ===== SUBMIT BUTTON ===== */
.auth-submit {
  width: 100%;
  padding: 13px 24px;
  background: var(--gradient-primary);
  border: none;
  border-radius: var(--radius-pill);
  color: #ffffff;
  font-family: var(--font-display);
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  box-shadow: 0 0 24px rgba(99, 102, 241, 0.3);
  transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  margin-top: 4px;
}

.auth-submit:hover {
  transform: translateY(-2px);
  box-shadow: 0 0 36px rgba(99, 102, 241, 0.45);
}

.auth-submit:active {
  transform: translateY(0);
  box-shadow: 0 0 20px rgba(99, 102, 241, 0.25);
}

/* ===== FOOTER LINK ===== */
.auth-footer {
  text-align: center;
  margin-top: 24px;
  font-size: 13px;
  color: var(--color-text-light-muted);
}

.auth-footer a {
  color: var(--color-primary);
  text-decoration: none;
  font-weight: 600;
  transition: all 0.2s ease;
}

.auth-footer a:hover {
  color: var(--color-secondary);
  text-decoration: underline;
  text-underline-offset: 3px;
}

/* ===== PAGE VARIANTS ===== */
.auth-page {
  display: none;
}

.auth-page.active {
  display: block;
}

/* ===== WATERMARK ===== */
.wireframe-watermark {
  position: fixed;
  bottom: 16px;
  right: 20px;
  z-index: 100;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--color-text-light-dim);
  padding: 6px 12px;
  background: rgba(22, 27, 34, 0.7);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border: 1px solid rgba(255, 255, 255, 0.06);
  border-radius: var(--radius-sm);
}

/* ===== PASSWORD TOGGLE ===== */
.auth-input-wrapper {
  position: relative;
}

.auth-input-wrapper .auth-input {
  padding-right: 44px;
}

.auth-eye-btn {
  position: absolute;
  right: 10px;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  color: var(--color-text-light-dim);
  cursor: pointer;
  padding: 4px;
  border-radius: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: color 0.2s ease;
}

.auth-eye-btn:hover {
  color: var(--color-text-light-muted);
}

.auth-eye-btn svg {
  width: 18px;
  height: 18px;
}

/* ===== PASSWORD STRENGTH (signup only) ===== */
.auth-password-strength {
  display: flex;
  gap: 4px;
  margin-top: 4px;
}

.auth-strength-bar {
  flex: 1;
  height: 3px;
  background: rgba(255, 255, 255, 0.08);
  border-radius: var(--radius-pill);
  overflow: hidden;
  transition: background 0.3s ease;
}

.auth-strength-bar.filled-weak { background: #f87171; }
.auth-strength-bar.filled-medium { background: #fbbf24; }
.auth-strength-bar.filled-strong { background: #10B981; }

.auth-strength-label {
  font-size: 11px;
  margin-top: 4px;
  transition: color 0.3s ease;
}

/* ===== RESPONSIVE ===== */
@media (max-width: 480px) {
  .auth-card-inner {
    padding: 32px 24px 28px;
  }

  .auth-logo-text {
    font-size: 20px;
  }

  .auth-title {
    font-size: 22px;
  }

  .wireframe-tabs {
    top: 12px;
  }

  .wireframe-tab {
    font-size: 12px;
    padding: 6px 14px;
  }
}

@media (max-width: 360px) {
  .auth-card-inner {
    padding: 28px 18px 24px;
  }
}
</style>
</head>
<body>

<!-- ===== BACKGROUND ===== -->
<div class="auth-bg">
  <div class="auth-blob auth-blob-1"></div>
  <div class="auth-blob auth-blob-2"></div>
  <div class="auth-blob auth-blob-3"></div>
</div>

<!-- ===== WIREFRAME TAB SWITCHER ===== -->
<div class="wireframe-tabs">
  <button class="wireframe-tab active" data-page="login" onclick="switchPage('login')">Logowanie</button>
  <button class="wireframe-tab" data-page="signup" onclick="switchPage('signup')">Rejestracja</button>
</div>

<!-- ===== WATERMARK ===== -->
<div class="wireframe-watermark">wireframe &middot; auth pages</div>

<!-- ===== LOGIN PAGE ===== -->
<div class="auth-container">
  <div id="page-login" class="auth-page active">
    <div class="auth-card">
      <div class="auth-card-inner">

        <!-- Logo -->
        <div class="auth-logo">
          <div class="auth-logo-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 2L2 7l10 5 10-5-10-5z"/>
              <path d="M2 17l10 5 10-5"/>
              <path d="M2 12l10 5 10-5"/>
            </svg>
          </div>
          <span class="auth-logo-text">SkillBridge AI</span>
        </div>

        <!-- Heading -->
        <div class="auth-heading">
          <h1 class="auth-title">Witaj ponownie</h1>
          <p class="auth-subtitle">Zaloguj sie do swojego konta</p>
        </div>

        <!-- Google OAuth -->
        <button class="auth-google-btn" type="button">
          <svg viewBox="0 0 24 24">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Kontynuuj z Google
        </button>

        <!-- Divider -->
        <div class="auth-divider">
          <div class="auth-divider-line"></div>
          <span class="auth-divider-text">lub</span>
          <div class="auth-divider-line"></div>
        </div>

        <!-- Login Form -->
        <form class="auth-form" onsubmit="handleLoginSubmit(event)">
          <div class="auth-field">
            <label class="auth-label" for="login-email">Email</label>
            <input class="auth-input" id="login-email" type="email" placeholder="twoj@email.com" autocomplete="email">
          </div>

          <div class="auth-field">
            <label class="auth-label" for="login-password">Haslo</label>
            <div class="auth-input-wrapper">
              <input class="auth-input" id="login-password" type="password" placeholder="Twoje haslo" autocomplete="current-password">
              <button type="button" class="auth-eye-btn" onclick="togglePassword('login-password', this)" aria-label="Pokaz haslo">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>
          </div>

          <div id="login-error" class="auth-error">Nieprawidlowy email lub haslo</div>

          <button type="submit" class="auth-submit">Zaloguj sie</button>
        </form>

        <!-- Footer -->
        <p class="auth-footer">
          Nie masz konta? <a href="#" onclick="switchPage('signup'); return false;">Utworz konto</a>
        </p>
      </div>
    </div>
  </div>

  <!-- ===== SIGNUP PAGE ===== -->
  <div id="page-signup" class="auth-page">
    <div class="auth-card">
      <div class="auth-card-inner">

        <!-- Logo -->
        <div class="auth-logo">
          <div class="auth-logo-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 2L2 7l10 5 10-5-10-5z"/>
              <path d="M2 17l10 5 10-5"/>
              <path d="M2 12l10 5 10-5"/>
            </svg>
          </div>
          <span class="auth-logo-text">SkillBridge AI</span>
        </div>

        <!-- Heading -->
        <div class="auth-heading">
          <h1 class="auth-title">Utworz konto</h1>
          <p class="auth-subtitle">Dolacz do SkillBridge AI</p>
        </div>

        <!-- Google OAuth -->
        <button class="auth-google-btn" type="button">
          <svg viewBox="0 0 24 24">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Kontynuuj z Google
        </button>

        <!-- Divider -->
        <div class="auth-divider">
          <div class="auth-divider-line"></div>
          <span class="auth-divider-text">lub</span>
          <div class="auth-divider-line"></div>
        </div>

        <!-- Signup Form -->
        <form class="auth-form" onsubmit="handleSignupSubmit(event)">
          <div class="auth-field">
            <label class="auth-label" for="signup-name">Imie i nazwisko</label>
            <input class="auth-input" id="signup-name" type="text" placeholder="Jan Kowalski" autocomplete="name">
          </div>

          <div class="auth-field">
            <label class="auth-label" for="signup-email">Email</label>
            <input class="auth-input" id="signup-email" type="email" placeholder="twoj@email.com" autocomplete="email">
          </div>

          <div class="auth-field">
            <label class="auth-label" for="signup-password">Haslo</label>
            <div class="auth-input-wrapper">
              <input class="auth-input" id="signup-password" type="password" placeholder="Min. 8 znakow" autocomplete="new-password" oninput="updatePasswordStrength(this.value)">
              <button type="button" class="auth-eye-btn" onclick="togglePassword('signup-password', this)" aria-label="Pokaz haslo">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>
            <div class="auth-password-strength">
              <div class="auth-strength-bar" id="str-bar-1"></div>
              <div class="auth-strength-bar" id="str-bar-2"></div>
              <div class="auth-strength-bar" id="str-bar-3"></div>
              <div class="auth-strength-bar" id="str-bar-4"></div>
            </div>
            <div class="auth-strength-label" id="str-label" style="color: var(--color-text-light-dim);"></div>
          </div>

          <div id="signup-error" class="auth-error">Nie udalo sie utworzyc konta</div>

          <button type="submit" class="auth-submit">Utworz konto</button>
        </form>

        <!-- Footer -->
        <p class="auth-footer">
          Masz juz konto? <a href="#" onclick="switchPage('login'); return false;">Zaloguj sie</a>
        </p>
      </div>
    </div>
  </div>
</div>

<script>
// ===== PAGE SWITCHER =====
function switchPage(page) {
  // Update tabs
  document.querySelectorAll('.wireframe-tab').forEach(function(tab) {
    tab.classList.toggle('active', tab.dataset.page === page);
  });

  // Update pages
  document.querySelectorAll('.auth-page').forEach(function(p) {
    p.classList.remove('active');
  });
  document.getElementById('page-' + page).classList.add('active');

  // Re-trigger card animation
  var card = document.querySelector('#page-' + page + ' .auth-card');
  card.style.animation = 'none';
  // Force reflow
  void card.offsetHeight;
  card.style.animation = 'card-appear 0.5s ease forwards';
}

// ===== PASSWORD VISIBILITY TOGGLE =====
function togglePassword(inputId, btn) {
  var input = document.getElementById(inputId);
  var isPassword = input.type === 'password';
  input.type = isPassword ? 'text' : 'password';

  // Swap icon
  if (isPassword) {
    btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>';
  } else {
    btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
  }
}

// ===== PASSWORD STRENGTH =====
function updatePasswordStrength(value) {
  var score = 0;
  if (value.length >= 8) score++;
  if (/[A-Z]/.test(value)) score++;
  if (/[0-9]/.test(value)) score++;
  if (/[^A-Za-z0-9]/.test(value)) score++;

  var bars = [
    document.getElementById('str-bar-1'),
    document.getElementById('str-bar-2'),
    document.getElementById('str-bar-3'),
    document.getElementById('str-bar-4')
  ];
  var label = document.getElementById('str-label');

  var colors = {
    0: { cls: '', label: '', color: 'var(--color-text-light-dim)' },
    1: { cls: 'filled-weak', label: 'Slabe', color: '#f87171' },
    2: { cls: 'filled-medium', label: 'Srednie', color: '#fbbf24' },
    3: { cls: 'filled-strong', label: 'Dobre', color: '#10B981' },
    4: { cls: 'filled-strong', label: 'Silne', color: '#10B981' }
  };

  bars.forEach(function(bar, i) {
    bar.className = 'auth-strength-bar';
    if (value.length > 0 && i < score) {
      bar.classList.add(colors[score].cls);
    }
  });

  if (value.length === 0) {
    label.textContent = '';
  } else {
    label.textContent = colors[score].label;
    label.style.color = colors[score].color;
  }
}

// ===== DEMO FORM HANDLERS =====
function handleLoginSubmit(e) {
  e.preventDefault();
  var email = document.getElementById('login-email').value;
  var password = document.getElementById('login-password').value;
  var errorEl = document.getElementById('login-error');

  if (!email || !password) {
    errorEl.textContent = 'Wypelnij wszystkie pola';
    errorEl.classList.add('visible');
    return;
  }

  // Simulate success
  errorEl.classList.remove('visible');
  var btn = e.target.querySelector('.auth-submit');
  btn.textContent = 'Logowanie...';
  btn.style.opacity = '0.7';
  btn.style.pointerEvents = 'none';

  setTimeout(function() {
    btn.textContent = 'Zaloguj sie';
    btn.style.opacity = '1';
    btn.style.pointerEvents = '';
    alert('Demo: Zalogowano pomyslnie!');
  }, 1500);
}

function handleSignupSubmit(e) {
  e.preventDefault();
  var name = document.getElementById('signup-name').value;
  var email = document.getElementById('signup-email').value;
  var password = document.getElementById('signup-password').value;
  var errorEl = document.getElementById('signup-error');

  if (!name || !email || !password) {
    errorEl.textContent = 'Wypelnij wszystkie pola';
    errorEl.classList.add('visible');
    return;
  }

  if (password.length < 8) {
    errorEl.textContent = 'Haslo musi miec minimum 8 znakow';
    errorEl.classList.add('visible');
    return;
  }

  // Simulate success
  errorEl.classList.remove('visible');
  var btn = e.target.querySelector('.auth-submit');
  btn.textContent = 'Tworzenie konta...';
  btn.style.opacity = '0.7';
  btn.style.pointerEvents = 'none';

  setTimeout(function() {
    btn.textContent = 'Utworz konto';
    btn.style.opacity = '1';
    btn.style.pointerEvents = '';
    alert('Demo: Konto utworzone pomyslnie!');
  }, 1500);
}

// ===== INPUT FOCUS VISUAL ENHANCEMENT =====
document.querySelectorAll('.auth-input').forEach(function(input) {
  input.addEventListener('focus', function() {
    this.closest('.auth-field').querySelector('.auth-label').style.color = 'rgba(99, 102, 241, 0.85)';
  });
  input.addEventListener('blur', function() {
    this.closest('.auth-field').querySelector('.auth-label').style.color = '';
  });
});
